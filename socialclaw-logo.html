<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialClaw Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a22;
    }

    .logo {
      width: 1024px;
      height: 1024px;
      background: #08080A;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .logo-text {
      font-family: 'Outfit', system-ui, sans-serif;
      font-weight: 800;
      font-size: 620px;
      line-height: 1;
      letter-spacing: -0.02em;
      user-select: none;
      position: relative;
      z-index: 1;
    }

    .logo-text .letter {
      color: #F5F5F7;
    }

    .logo-text .dot {
      color: #D4845A;
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo-text">
      <span class="letter">S</span><span class="dot">.</span>
    </span>
  </div>
</body>
</html>
